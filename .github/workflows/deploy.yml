name: deploy-cloud-run

# Auto-deploy on push to main. Keyless auth via Workload Identity Federation (no SA key
# stored in the repo). Builds the container, pushes to Artifact Registry, deploys to Cloud
# Run (scale-to-zero, max-instances capped to bound cost + DoS blast radius).

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "runs/**"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # required for WIF OIDC token

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: praman
  REPO: praman

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}"
          docker build -t "${IMAGE}:${GITHUB_SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --cpu=2 --memory=2Gi \
            --min-instances=0 --max-instances=3 \
            --concurrency=4 --timeout=120 --cpu-boost \
            --set-env-vars=HF_HUB_OFFLINE=1,TRANSFORMERS_OFFLINE=1,TOKENIZERS_PARALLELISM=false,PRAMAN_THREADS=2,OMP_NUM_THREADS=2 \
            --quiet

      - name: Show URL + smoke test
        run: |
          URL=$(gcloud run services describe "${SERVICE}" --region="${REGION}" --format='value(status.url)')
          echo "Deployed: $URL"
          echo "### Deployed: $URL" >> "$GITHUB_STEP_SUMMARY"
          curl -fsS "$URL/health" && echo " health OK"
